<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel — Karmik Matris</title>
    <link rel="stylesheet" href="admin.css">
    <script src="/lib/supabase-config.js"></script>
</head>
<body>

<header class="admin-topbar">
    <a href="/admin/" class="admin-brand">
        <svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M16 2 L20 12 L30 14 L22 22 L24 32 L16 26 L8 32 L10 22 L2 14 L12 12 Z"/></svg>
        Admin Panel
    </a>
    <nav class="admin-topnav">
        <a href="/" class="admin-back-link">← Anasayfa</a>
        <button id="logoutBtn" class="admin-logout-btn">Çıkış</button>
    </nav>
</header>

<div class="admin-layout">
    <aside class="admin-sidebar">
        <nav class="admin-nav">
            <a href="/admin/" class="admin-nav-link active">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
                Dashboard
            </a>
            <a href="/admin/odemeler.html" class="admin-nav-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="6" width="18" height="14" rx="1"/><path d="M3 10 H21"/></svg>
                Ödemeler
                <span id="pendingBadge" class="admin-nav-badge" style="display:none;">0</span>
            </a>
            <a href="/admin/kullanicilar.html" class="admin-nav-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21 a8 8 0 0 1 16 0"/></svg>
                Kullanıcılar
            </a>
        </nav>
    </aside>

    <main class="admin-content">
        <header class="admin-page-header">
            <h1 class="admin-page-title">Genel Bakış</h1>
            <p class="admin-page-subtitle">Sistem istatistikleri ve hızlı durum özeti.</p>
        </header>

        <section class="admin-stats-grid" id="statsGrid">
            <div class="admin-stat-card"><div class="admin-stat-label">Yükleniyor...</div></div>
        </section>

        <section class="admin-section">
            <h2 class="admin-section-title">Hızlı İşlemler</h2>
            <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
                <a href="/admin/odemeler.html" class="admin-btn-approve" style="text-decoration: none; padding: 0.85rem 1.4rem;">Bekleyen Ödemeleri Görüntüle</a>
                <a href="/admin/kullanicilar.html" class="admin-btn-approve" style="text-decoration: none; padding: 0.85rem 1.4rem; background: linear-gradient(135deg, #6e3a85, #9B59B6);">Tüm Kullanıcılar</a>
            </div>
        </section>
    </main>
</div>

<script type="module">
    import { requireAuth, apiFetch, initAdminTopbar, formatPriceTR } from '/admin/admin.js';

    await requireAuth({ requireAdmin: true });
    await initAdminTopbar();

    try {
        const stats = await apiFetch('/api/admin/stats');
        document.getElementById('statsGrid').innerHTML = `
            <div class="admin-stat-card admin-stat-pending">
                <div class="admin-stat-label">Bekleyen Ödeme</div>
                <div class="admin-stat-value">${stats.pending_payments}</div>
                <div class="admin-stat-hint">Onay bekliyor</div>
            </div>
            <div class="admin-stat-card">
                <div class="admin-stat-label">Toplam Kullanıcı</div>
                <div class="admin-stat-value">${stats.users}</div>
                <div class="admin-stat-hint">Kayıtlı üye</div>
            </div>
            <div class="admin-stat-card">
                <div class="admin-stat-label">Toplam Analiz</div>
                <div class="admin-stat-value">${stats.total_analyses}</div>
                <div class="admin-stat-hint">Tüm zamanlar</div>
            </div>
            <div class="admin-stat-card">
                <div class="admin-stat-label">Bu Hafta</div>
                <div class="admin-stat-value">${stats.weekly_analyses}</div>
                <div class="admin-stat-hint">Son 7 gün analiz</div>
            </div>
            <div class="admin-stat-card admin-stat-revenue">
                <div class="admin-stat-label">Toplam Gelir</div>
                <div class="admin-stat-value">${formatPriceTR(stats.total_revenue)}</div>
                <div class="admin-stat-hint">${stats.approved_payments} onaylı ödemeden</div>
            </div>
        `;
    } catch (err) {
        console.error(err);
        document.getElementById('statsGrid').innerHTML =
            '<div class="admin-empty">İstatistikler yüklenemedi.</div>';
    }
</script>

</body>
</html>
