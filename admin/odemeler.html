<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ödemeler — Admin Panel</title>
    <link rel="stylesheet" href="admin.css">
    <script src="/lib/supabase-config.js"></script>
</head>
<body>

<header class="admin-topbar">
    <a href="/admin/" class="admin-brand">
        <svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M16 2 L20 12 L30 14 L22 22 L24 32 L16 26 L8 32 L10 22 L2 14 L12 12 Z"/></svg>
        Admin Panel
    </a>
    <nav class="admin-topnav">
        <a href="/" class="admin-back-link">← Anasayfa</a>
        <button id="logoutBtn" class="admin-logout-btn">Çıkış</button>
    </nav>
</header>

<div class="admin-layout">
    <aside class="admin-sidebar">
        <nav class="admin-nav">
            <a href="/admin/" class="admin-nav-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
                Dashboard
            </a>
            <a href="/admin/odemeler.html" class="admin-nav-link active">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="6" width="18" height="14" rx="1"/><path d="M3 10 H21"/></svg>
                Ödemeler
                <span id="pendingBadge" class="admin-nav-badge" style="display:none;">0</span>
            </a>
            <a href="/admin/kullanicilar.html" class="admin-nav-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21 a8 8 0 0 1 16 0"/></svg>
                Kullanıcılar
            </a>
        </nav>
    </aside>

    <main class="admin-content">
        <header class="admin-page-header">
            <h1 class="admin-page-title">Ödemeler</h1>
            <p class="admin-page-subtitle">Havale ile gelen ödeme bildirimlerini onaylayın veya reddedin.</p>
        </header>

        <div class="admin-tabs">
            <button class="admin-tab active" data-status="pending">Bekleyen</button>
            <button class="admin-tab" data-status="approved">Onaylanmış</button>
            <button class="admin-tab" data-status="rejected">Reddedilmiş</button>
        </div>

        <div id="paymentsContainer">
            <div class="admin-loading"><div class="admin-spinner"></div></div>
        </div>
    </main>
</div>

<script type="module">
    import { requireAuth, apiFetch, initAdminTopbar, formatDateTimeTR, formatPriceTR, escHtml, showToast, promptRejectReason } from '/admin/admin.js';

    await requireAuth({ requireAdmin: true });
    await initAdminTopbar();

    let currentStatus = 'pending';

    document.querySelectorAll('.admin-tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            currentStatus = tab.dataset.status;
            loadPayments();
        });
    });

    async function loadPayments() {
        const container = document.getElementById('paymentsContainer');
        container.innerHTML = '<div class="admin-loading"><div class="admin-spinner"></div></div>';

        try {
            const { payments } = await apiFetch(`/api/admin/payments?status=${currentStatus}`);

            if (!payments || payments.length === 0) {
                container.innerHTML = `<div class="admin-empty">${currentStatus === 'pending' ? 'Bekleyen ödeme yok' : 'Bu durumda kayıt bulunamadı'}.</div>`;
                return;
            }

            container.innerHTML = `
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Tarih</th>
                            <th>Kullanıcı</th>
                            <th>Paket</th>
                            <th>Tutar / Kredi</th>
                            <th>Havale Bilgisi</th>
                            ${currentStatus === 'pending' ? '<th>İşlem</th>' : '<th>Durum</th>'}
                        </tr>
                    </thead>
                    <tbody>
                        ${payments.map(p => {
                            const profile = p.profiles || {};
                            return `
                                <tr id="row-${p.id}">
                                    <td>${formatDateTimeTR(p.created_at)}</td>
                                    <td>
                                        <strong>${escHtml(profile.full_name || '—')}</strong>
                                        <small>${escHtml(profile.email || '')}</small>
                                        ${profile.phone ? `<small>${escHtml(profile.phone)}</small>` : ''}
                                    </td>
                                    <td>${escHtml(p.package_name)}</td>
                                    <td>
                                        <strong>${formatPriceTR(p.amount_try)}</strong>
                                        <small>${p.credits} kredi</small>
                                    </td>
                                    <td>
                                        <strong>${escHtml(p.sender_name)}</strong>
                                        ${p.bank_name ? `<small>${escHtml(p.bank_name)}</small>` : ''}
                                        ${p.sender_iban ? `<small>${escHtml(p.sender_iban)}</small>` : ''}
                                        ${p.transfer_date ? `<small>Tarih: ${p.transfer_date}</small>` : ''}
                                        ${p.reference_note ? `<small style="font-style: italic;">"${escHtml(p.reference_note)}"</small>` : ''}
                                    </td>
                                    <td>
                                        ${currentStatus === 'pending' ? `
                                            <button class="admin-btn-approve" data-action="approve" data-id="${p.id}">Onayla</button>
                                            <button class="admin-btn-reject" data-action="reject" data-id="${p.id}">Reddet</button>
                                        ` : `
                                            ${p.status === 'approved' ? '<span class="hesap-badge approved">Onaylı</span>' : '<span class="hesap-badge rejected">Red</span>'}
                                            ${p.admin_note ? `<small>${escHtml(p.admin_note)}</small>` : ''}
                                            ${p.approved_at ? `<small>${formatDateTimeTR(p.approved_at)}</small>` : ''}
                                        `}
                                    </td>
                                </tr>
                            `;
                        }).join('')}
                    </tbody>
                </table>
            `;

            // Event delegation
            container.addEventListener('click', async (e) => {
                const btn = e.target.closest('button[data-action]');
                if (!btn) return;
                const id = btn.dataset.id;
                const action = btn.dataset.action;

                if (action === 'approve') {
                    if (!confirm('Bu ödemeyi onaylamak istediğinizden emin misiniz? Kullanıcının kredisi yüklenecek.')) return;
                    btn.disabled = true;
                    try {
                        const result = await apiFetch('/api/admin/approve-payment', {
                            method: 'POST',
                            body: JSON.stringify({ payment_id: id })
                        });
                        showToast('success', result.message || 'Ödeme onaylandı');
                        document.getElementById('row-' + id)?.remove();
                        await initAdminTopbar(); // badge güncelle
                    } catch (err) {
                        showToast('error', 'Onay başarısız: ' + err.message);
                        btn.disabled = false;
                    }
                } else if (action === 'reject') {
                    const reason = await promptRejectReason();
                    if (reason === null) return; // iptal
                    btn.disabled = true;
                    try {
                        await apiFetch('/api/admin/reject-payment', {
                            method: 'POST',
                            body: JSON.stringify({ payment_id: id, reason })
                        });
                        showToast('success', 'Ödeme reddedildi');
                        document.getElementById('row-' + id)?.remove();
                        await initAdminTopbar();
                    } catch (err) {
                        showToast('error', 'Reddetme başarısız: ' + err.message);
                        btn.disabled = false;
                    }
                }
            }, { once: false });
        } catch (err) {
            console.error(err);
            container.innerHTML = `<div class="admin-empty">Ödemeler yüklenemedi: ${err.message}</div>`;
        }
    }

    await loadPayments();
</script>

</body>
</html>
