<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analiz Geçmişi — Karmik Matris Analizi</title>
    <link rel="stylesheet" href="hesap.css">
    <script src="/lib/supabase-config.js"></script>
</head>
<body>

<header class="hesap-topbar">
    <a href="/hesap/" class="hesap-brand">
        <svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="16" cy="16" r="13"/><path d="M16 3 L16 29 M3 16 L29 16"/></svg>
        Karmik Matris
    </a>
    <nav class="hesap-topnav">
        <span id="creditPill" class="hesap-credit-pill">…</span>
        <a href="/admin/" id="adminLink" class="hesap-credit-pill" style="display:none; color: var(--amethyst); border-color: var(--amethyst);">Admin</a>
        <button id="logoutBtn" class="hesap-logout-btn">Çıkış Yap</button>
    </nav>
</header>

<div class="hesap-layout">
    <aside class="hesap-sidebar">
        <nav class="hesap-nav">
            <a href="/hesap/" class="hesap-nav-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12 L12 3 L21 12 M5 10 V20 H19 V10"/></svg>
                Genel Bakış
            </a>
            <a href="/hesap/gecmis.html" class="hesap-nav-link active">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12 a9 9 0 1 0 3-6.7"/><path d="M3 4 V10 H9"/><path d="M12 7 V12 L15 14"/></svg>
                Analiz Geçmişi
            </a>
            <a href="/hesap/odeme.html" class="hesap-nav-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="6" width="18" height="14" rx="1"/><path d="M3 10 H21 M7 16 H9"/></svg>
                Kredi Yükle
            </a>
            <a href="/" class="hesap-nav-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12 L12 5 L19 12 V20 H14 V14 H10 V20 H5 Z"/></svg>
                Yeni Analiz
            </a>
        </nav>
    </aside>

    <main class="hesap-content">
        <header class="hesap-page-header">
            <h1 class="hesap-page-title">Analiz Geçmişi</h1>
            <p class="hesap-page-subtitle">Yaptığınız tüm Karmik Matris analizleri. Detayları görüntüleyebilir, PDF raporu yeniden indirebilirsiniz.</p>
        </header>

        <div id="historyContent">
            <div class="hesap-loading"><div class="hesap-spinner"></div></div>
        </div>
    </main>
</div>

<script type="module">
    import { requireAuth, apiFetch, initTopbar, formatDateTR, isoDateToTR, escHtml } from '/hesap/hesap.js';

    await requireAuth();
    await initTopbar();

    try {
        const { analyses } = await apiFetch('/api/analyses/list?limit=200');
        const container = document.getElementById('historyContent');

        if (!analyses || analyses.length === 0) {
            container.innerHTML = `
                <div class="hesap-empty">
                    <svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="32" cy="32" r="28"/></svg>
                    <p>Henüz analiz yapılmamış. <a href="/" style="color: var(--gold-bright);">İlk analizinizi yapın</a></p>
                </div>
            `;
        } else {
            container.innerHTML = `
                <table class="hesap-table">
                    <thead>
                        <tr>
                            <th>Yapıldığı Tarih</th>
                            <th>Doğum Tarihi</th>
                            <th>Şehir</th>
                            <th>Müşteri</th>
                            <th>İşlem</th>
                        </tr>
                    </thead>
                    <tbody id="historyTbody">
                        ${analyses.map(a => `
                            <tr id="row-${a.id}">
                                <td data-label="Tarih">${formatDateTR(a.created_at)}</td>
                                <td data-label="Doğum">${isoDateToTR(a.birth_date)}</td>
                                <td data-label="Şehir">${escHtml(a.birth_city) || '—'}</td>
                                <td data-label="Müşteri">${escHtml(a.client_name) || '—'}</td>
                                <td>
                                    <button class="hesap-table-action" data-action="view" data-id="${a.id}">Görüntüle</button>
                                    <button class="hesap-table-action" data-action="pdf" data-id="${a.id}">PDF</button>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;

            // event delegation
            container.addEventListener('click', async (e) => {
                const btn = e.target.closest('button[data-action]');
                if (!btn) return;
                const id = btn.dataset.id;
                const action = btn.dataset.action;

                if (action === 'view') {
                    // detayı yeni sekmede aç (basit overlay yerine, oturuma yer açmak için)
                    window.location.href = `/hesap/analiz.html?id=${id}`;
                } else if (action === 'pdf') {
                    btn.disabled = true;
                    btn.textContent = '...';
                    try {
                        const { analysis } = await apiFetch(`/api/analyses/get?id=${id}`);
                        // PDF tekrar üretmek için ayrı sayfaya yönlendir
                        sessionStorage.setItem('km_replay_analysis', JSON.stringify(analysis));
                        window.location.href = `/hesap/analiz.html?id=${id}&download=1`;
                    } catch (err) {
                        alert('PDF üretilemedi: ' + err.message);
                        btn.disabled = false;
                        btn.textContent = 'PDF';
                    }
                }
            });
        }
    } catch (err) {
        console.error(err);
        document.getElementById('historyContent').innerHTML =
            '<div class="hesap-empty">Geçmiş yüklenemedi: ' + err.message + '</div>';
    }
</script>

</body>
</html>
