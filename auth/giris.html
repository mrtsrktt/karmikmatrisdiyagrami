<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap — Karmik Matris Analizi</title>
    <link rel="stylesheet" href="auth.css">
    <script src="/lib/supabase-config.js"></script>
</head>
<body>

<div class="auth-stars" aria-hidden="true"></div>

<header class="auth-topbar">
    <a href="/" class="auth-back">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M10 13L5 8l5-5v3h4v4h-4v3z"/></svg>
        Ana Sayfa
    </a>
    <span class="auth-brand">Karmik Matris Analizi</span>
</header>

<main class="auth-main">
    <section class="auth-card">

        <div class="auth-header">
            <svg class="auth-symbol" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5">
                <circle cx="32" cy="32" r="28"/>
                <circle cx="32" cy="32" r="20"/>
                <path d="M32 4 L32 60 M4 32 L60 32 M12 12 L52 52 M52 12 L12 52"/>
            </svg>
            <h1 class="auth-title">Giriş Yap</h1>
            <p class="auth-subtitle">Karmik Matris hesabınıza erişmek için kimlik bilgilerinizi girin.</p>
        </div>

        <form id="loginForm" class="auth-form" novalidate>

            <div class="auth-field">
                <label class="auth-label" for="email">E-posta</label>
                <input class="auth-input" type="email" id="email" name="email" placeholder="ornek@karmikmatris.com" autocomplete="email" required>
            </div>

            <div class="auth-field">
                <label class="auth-label" for="password">Şifre</label>
                <input class="auth-input" type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
            </div>

            <div id="authMessage" class="auth-message"></div>

            <button type="submit" id="loginBtn" class="auth-btn">Giriş Yap</button>
        </form>

        <div class="auth-divider">veya</div>

        <div style="text-align: center;">
            <a href="/auth/sifremi-unuttum.html" style="color: var(--gold-bright); text-decoration: none; font-size: 1rem; border-bottom: 1px dotted var(--border-gold);">Şifremi Unuttum</a>
        </div>

        <div class="auth-footer">
            Henüz hesabınız yok mu? <a href="/auth/kayit.html">Hesap Oluşturun</a>
        </div>

    </section>
</main>

<script type="module">
    import { initLoginForm } from '/auth/auth.js';
    initLoginForm();
</script>

</body>
</html>
