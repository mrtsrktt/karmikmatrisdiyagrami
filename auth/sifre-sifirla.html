<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Şifre Sıfırla — Karmik Matris Analizi</title>
    <link rel="stylesheet" href="auth.css">
    <script src="/lib/supabase-config.js"></script>
</head>
<body>

<div class="auth-stars" aria-hidden="true"></div>

<header class="auth-topbar">
    <a href="/auth/giris.html" class="auth-back">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M10 13L5 8l5-5v3h4v4h-4v3z"/></svg>
        Giriş Sayfası
    </a>
    <span class="auth-brand">Karmik Matris Analizi</span>
</header>

<main class="auth-main">
    <section class="auth-card">

        <div class="auth-header">
            <svg class="auth-symbol" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M32 8 L32 16 M52 16 L46 22 M56 36 L48 36 M52 56 L46 50 M32 64 L32 56 M12 56 L18 50 M8 36 L16 36 M12 16 L18 22"/>
                <circle cx="32" cy="36" r="14"/>
                <path d="M28 36 L31 39 L38 32"/>
            </svg>
            <h1 class="auth-title">Yeni Şifre Belirle</h1>
            <p class="auth-subtitle">Lütfen yeni şifrenizi iki kez girin.</p>
        </div>

        <form id="resetForm" class="auth-form" novalidate>

            <div class="auth-field">
                <label class="auth-label" for="password">Yeni Şifre</label>
                <input class="auth-input" type="password" id="password" name="password" placeholder="En az 8 karakter" autocomplete="new-password" required minlength="8">
                <p class="auth-password-hint">En az 8 karakter, tercihen büyük/küçük harf ve rakam.</p>
            </div>

            <div class="auth-field">
                <label class="auth-label" for="password2">Yeni Şifre (Tekrar)</label>
                <input class="auth-input" type="password" id="password2" name="password2" placeholder="••••••••" autocomplete="new-password" required minlength="8">
            </div>

            <div id="authMessage" class="auth-message"></div>

            <button type="submit" id="resetBtn" class="auth-btn">Şifremi Güncelle</button>
        </form>

    </section>
</main>

<script type="module">
    import { initResetForm } from '/auth/auth.js';
    initResetForm();
</script>

</body>
</html>
