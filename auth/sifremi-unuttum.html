<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Şifremi Unuttum — Karmik Matris Analizi</title>
    <link rel="stylesheet" href="auth.css">
    <script src="/lib/supabase-config.js"></script>
</head>
<body>

<div class="auth-stars" aria-hidden="true"></div>

<header class="auth-topbar">
    <a href="/auth/giris.html" class="auth-back">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M10 13L5 8l5-5v3h4v4h-4v3z"/></svg>
        Giriş Sayfası
    </a>
    <span class="auth-brand">Karmik Matris Analizi</span>
</header>

<main class="auth-main">
    <section class="auth-card">

        <div class="auth-header">
            <svg class="auth-symbol" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5">
                <rect x="14" y="28" width="36" height="28" rx="2"/>
                <path d="M22 28 V18 a10 10 0 0 1 20 0 V28"/>
                <circle cx="32" cy="42" r="3" fill="currentColor"/>
            </svg>
            <h1 class="auth-title">Şifremi Unuttum</h1>
            <p class="auth-subtitle">E-posta adresinizi girin, şifre sıfırlama bağlantısını size gönderelim.</p>
        </div>

        <form id="forgotForm" class="auth-form" novalidate>

            <div class="auth-field">
                <label class="auth-label" for="email">E-posta</label>
                <input class="auth-input" type="email" id="email" name="email" placeholder="ornek@karmikmatris.com" autocomplete="email" required>
            </div>

            <div id="authMessage" class="auth-message"></div>

            <button type="submit" id="forgotBtn" class="auth-btn">Sıfırlama Bağlantısı Gönder</button>
        </form>

        <div class="auth-footer">
            Şifrenizi hatırladınız mı? <a href="/auth/giris.html">Giriş Yapın</a>
        </div>

    </section>
</main>

<script type="module">
    import { initForgotForm } from '/auth/auth.js';
    initForgotForm();
</script>

</body>
</html>
